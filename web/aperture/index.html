<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script src="../q-ui-global.js?v=16.4"></script>
    <script src="../q-core.js?v=16.4"></script>
    <script src="../q-ui-planner.js?v=16.4"></script>
    <script src="../q-hub.js?v=16.4"></script>
    
    <script>
        if (/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            document.documentElement.classList.add('is-mobile-device');
        }
        if(sessionStorage.getItem('Q_BOOT_COMPLETE') === 'true') {
            document.write('<style>#boot-overlay { display: none !important; }</style>');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.remove('boot-active'));
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&family=Cinzel:wght@400&display=swap');

        /* ========================================================================= */
        /* --- APERTURE BLUEPRINT OVERRIDES: PURE WHITE-ON-BLACK GATEWAY ---         */
        /* ========================================================================= */

        /* 1. HIDE ALL NAVIGATION AND SCRUBBER PANELS */
        .q-nav-bar, 
        .q-global-controls, 
        #mobile-telemetry-ribbon, 
        .q-control-strip, 
        #q-mic-fab, 
        #q-mic-fab-desktop {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* 2. BLUEPRINT GRID BACKGROUND */
        body {
            background-color: #000000 !important;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px) !important;
            background-size: 40px 40px !important;
            margin: 0; height: 100dvh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 3. WING OVERRIDES (Force Blueprint Aesthetic on Dynamic Injections) */
        .wing-content {
            background: #000000 !important;
            border: 1px solid #ffffff !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        .w-head, .v-head { border-bottom: 1px solid #ffffff !important; color: #ffffff !important; text-shadow: none !important; }
        .val-lg, .q-val, .fmt-toggle, .val-sm, .t-row span, .w-lbl { color: #ffffff !important; text-shadow: none !important; }
        .fmt-toggle { border: 1px solid #ffffff !important; background: #000000 !important; }

        /* 4. THE 4 GATEWAY CORNERS */
        .vector-anchor {
            position: absolute; 
            width: calc(320px + 50px); 
            height: 120px; /* Reduced height, no data */
            z-index: 100; cursor: pointer; pointer-events: auto; 
            display: flex; justify-content: center; align-items: center; text-align: center;
            box-sizing: border-box; transition: all 0.3s ease; 
            background: #000000 !important;
            border: 1px solid #ffffff !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            backface-visibility: hidden;
        }
        .vector-anchor:hover {
            background: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4) !important;
        }
        
        .tl { top: 7vh; left: 2vw; }
        .tr { top: 7vh; right: 2vw; }
        .bl { bottom: 8vh; left: 2vw; }
        .br { bottom: 8vh; right: 2vw; }

        .gateway-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #ffffff;
        }

        /* 5. CENTER DIAL & CONFINED DENSE STARFIELD */
        .aperture-dial {
            position: absolute; 
            width: 60vh; 
            height: 60vh; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 30; 
            background: #000000;
            border: 2px solid #ffffff;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            overflow: hidden; /* This clips the starfield to the circle */
        }

        #dense-star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        /* 6. ROTATING MERCURY "Q" */
        .mercury-q {
            font-family: 'Cinzel', serif;
            font-size: 35vh;
            font-weight: 400;
            margin-top: -2vh; /* Visual optical alignment for the Q tail */
            background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 30%, #303030 50%, #d0d0d0 70%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));
            animation: rotate-mercury 8s linear infinite;
            z-index: 10;
        }

        @keyframes rotate-mercury {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Kinetic Star CSS */
        .star-kinetic {
            position: absolute; top: 50%; left: 50%; width: 1.5px;
            height: calc(1.5px + (40px * var(--warp-factor, 0.5)));
            background: #ffffff;
            border-radius: 1px;
            animation: warp-travel linear infinite;
        }
        @keyframes warp-travel {
            0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) translateZ(-300px); opacity: 0; }
            20% { opacity: var(--opacity); }
            80% { opacity: var(--opacity); }
            100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) translateZ(300px); opacity: 0; }
        }

    </style>
</head>
<body class="mode-q boot-active">

    <div class="vector-anchor tl" onclick="window.location.href='../personal/index.html'">
        <div class="gateway-title">PERSONAL QUAD</div>
    </div>
    
    <div class="vector-anchor tr" onclick="window.location.href='../commercial/index.html'">
        <div class="gateway-title">COMMERCIAL QUAD</div>
    </div>

    <div class="vector-anchor bl" onclick="window.location.href='../physical/index.html'">
        <div class="gateway-title">PHYSICAL ASSETS</div>
    </div>

    <div class="vector-anchor br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()">
        <div class="gateway-title">DASHBOARD</div>
    </div>

    <div class="aperture-dial">
        <div id="dense-star-layer"></div>
        <div class="mercury-q">Q</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('dense-star-layer');
            if(!container) return;
            
            // Generate 900 stars for a highly dense, confined void
            for(let i=0; i<900; i++) {
                let star = document.createElement('div');
                star.className = 'star-kinetic';
                star.style.setProperty('--angle', Math.random() * 360 + 'deg');
                // Confine radius generation to mostly within the dial
                star.style.setProperty('--radius', (Math.random() * 350) + 'px');
                star.style.setProperty('--opacity', Math.random() * 0.9 + 0.1);
                star.style.animationDuration = (Math.random() * 4 + 3) + 's'; // Slightly faster
                star.style.animationDelay = -(Math.random() * 10) + 's';
                container.appendChild(star);
            }
        });
    </script>
</body>
</html>
