<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>THE QUADRATURE // PERSONAL HUD</title>
    
    <script>
        // HUD DIRECT OVERRIDE: Neutralize initialization overlays
        sessionStorage.setItem('Q_BOOT_COMPLETE', 'true');
        document.write('<style>#boot-overlay, .q-boot-overlay, #q-initialization-screen { display: none !important; opacity: 0 !important; pointer-events: none !important; }</style>');
    </script>

    <script src="../q-ui-global.js?v=17.3.1"></script>
    <script src="../q-core.js?v=17.3.1"></script>
    <script src="../q-ui-planner.js?v=17.3.1"></script>
    <script src="../q-hub.js?v=17.3.1"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --void: #010308;
            --q-metal: #e2e8f0;
            --starlight: rgba(255, 255, 255, 0.6);
            
            /* Vector Colors */
            --bio-purple: #b829ff;
            --com-gold: #F4D068;
            --env-green: #a7ff83;
            --mec-cyan: #00f0ff;
            
            /* Layout Constants */
            --dial-size: 55vh;
            --mod-w: 360px;
            --mod-h: 160px; /* Stretched for 4-line telemetry */
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            background-color: var(--void);
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            color: var(--q-metal);
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        /* --- IMMERSIVE COSMIC DUST ENGINE --- */
        .space-bg {
            position: fixed; inset: 0; z-index: 0;
            background-image: 
                radial-gradient(ellipse at 15% 25%, rgba(10, 80, 180, 0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 75%, rgba(20, 60, 150, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(30, 100, 200, 0.06) 0%, transparent 65%);
        }

        .dust-layer {
            position: fixed; inset: 0; z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.006' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.12; mix-blend-mode: color-dodge; pointer-events: none;
        }

        /* --- THE APERTURE PANEL SYSTEM --- */
        .vector-anchor {
            position: absolute; width: var(--mod-w); height: var(--mod-h);
            z-index: 20; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .vector-anchor:hover { transform: scale(1.02); }

        .frost-zone {
            position: absolute; inset: 8px 14px;
            background: rgba(15, 20, 35, 0.55);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 6px; z-index: -2;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .panel-bg {
            position: absolute; inset: 0;
            background: url('../assets/panel-frame.png') center/100% 100% no-repeat;
            z-index: -1; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        .tl { top: 6vh; left: 2vw; }
        .tr { top: 6vh; right: 2vw; }
        .tr .panel-bg { transform: scaleX(-1); }
        .bl { bottom: 8vh; left: 2vw; }
        .bl .panel-bg { transform: scaleY(-1); }
        .br { bottom: 8vh; right: 2vw; }
        .br .panel-bg { transform: scale(-1, -1); }

        /* Panel Content Layout */
        .v-content {
            height: 100%; display: flex; flex-direction: column; justify-content: center;
            padding: 0 45px; box-sizing: border-box;
        }
        .tl .v-content, .bl .v-content { padding-left: 65px; }
        .tr .v-content, .br .v-content { padding-right: 65px; align-items: flex-end; }

        .v-head { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; letter-spacing: 3px; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.2); width: 100%; }
        .t-row { display: flex; justify-content: space-between; width: 100%; font-size: 0.75rem; margin-bottom: 4px; font-weight: 700; color: var(--starlight); }
        .val-sm { font-family: 'Orbitron'; font-weight: 700; color: #fff; }

        /* Vector Theming */
        .bio-text { color: var(--bio-purple); text-shadow: 0 0 10px rgba(184, 41, 255, 0.3); }
        .com-text { color: var(--com-gold); text-shadow: 0 0 10px rgba(244, 208, 104, 0.3); }
        .env-text { color: var(--env-green); text-shadow: 0 0 10px rgba(167, 255, 131, 0.3); }
        .mec-text { color: var(--mec-cyan); text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

        /* --- CENTRAL CHRONO-FACE --- */
        .gear-container {
            position: absolute; width: var(--dial-size); height: var(--dial-size);
            z-index: 10; display: flex; justify-content: center; align-items: center;
            background: rgba(10, 15, 25, 0.2); backdrop-filter: blur(20px);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0, 163, 255, 0.05);
        }

        .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        #ring-cycle-mean { width: 90%; height: 90%; border-top: 3px solid var(--q-metal); }
        #ring-cycle-true { width: 90%; height: 90%; border-top: 3px solid var(--com-gold); border-color: transparent var(--com-gold) transparent transparent; }
        #ring-day { width: 45%; height: 45%; border-top: 2px solid #fff; }

        .core-void {
            position: absolute; width: 25%; height: 25%; background: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 15;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }
        .q-asset { width: 60%; height: 60%; background: url('../assets/core-q.png') center/contain no-repeat; filter: drop-shadow(0 0 10px var(--mec-cyan)); }

    </style>
</head>
<body class="mode-q">

    <div class="space-bg"></div>
    <div class="dust-layer"></div>

    <div class="vector-anchor tl" onclick="window.openSlotRoutingModal('BIO')">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="v-content" id="quad-BIO"></div>
    </div>

    <div class="vector-anchor tr" onclick="window.openSlotRoutingModal('COM')">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="v-content" id="quad-COM"></div>
    </div>

    <div class="vector-anchor bl" onclick="window.openSlotRoutingModal('ENV')">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="v-content" id="quad-ENV"></div>
    </div>

    <div class="vector-anchor br" onclick="window.openSlotRoutingModal('MEC')">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="v-content" id="quad-MEC"></div>
    </div>

    <div class="gear-container">
        <div class="ring" id="ring-cycle-mean"></div>
        <div class="ring" id="ring-cycle-true"></div>
        <div class="ring" id="ring-day"></div>
        <div class="core-void"><div class="q-asset"></div></div>
    </div>

    <script>
        const V_META = {
            'BIO': { head: 'BIOLOGICAL', class: 'bio-text' },
            'COM': { head: 'COMMUNAL', class: 'com-text' },
            'ENV': { head: 'ENVIRONMENTAL', class: 'env-text' },
            'MEC': { head: 'MECHANICAL', class: 'mec-text' }
        };

        const V_METRICS = {
            'BIO': { HRV: 'HRV / Elasticity', PHASE: 'Ultradian Phase', LUNAR: 'Lunar Illumination', TIDE: 'Gravitational Tide' },
            'COM': { ZODIAC: 'Astrophysical Aspect', LEDGER: 'Sovereign Ledger', TERM: 'Solar Season', NODE: 'Q-Coordinate' },
            'ENV': { FRICTION: 'Thermodynamic Friction', RISK: 'Probability Index', TENSION: 'Biome Tension', GEO: 'Local Coordinate' },
            'MEC': { DRIFT: 'Drift to Pylon', ECCENTRICITY: 'Orbital Eccentricity', SYMMETRY: 'Temporal Symmetry', SMEAR: 'Gregorian Smear' }
        };

        window.refreshHUD = function() {
            ['BIO', 'COM', 'ENV', 'MEC'].forEach(vec => {
                const el = document.getElementById(`quad-${vec}`);
                const meta = V_META[vec];
                let html = `<div class="v-head ${meta.class}">${meta.head}</div>`;
                for(let i=1; i<=4; i++) {
                    const key = localStorage.getItem(`Q_SLOT_${vec}_${i}`) || Object.keys(V_METRICS[vec])[i-1];
                    html += `<div class="t-row"><span>${V_METRICS[vec][key].toUpperCase()}</span> <span id="face-${vec}-${key}" class="val-sm ${meta.class}">--</span></div>`;
                }
                el.innerHTML = html;
            });
        };

        window.addEventListener('q-tick', (e) => {
            const { t, qData, daysElapsed } = e.detail;
            
            // Central Mechanics
            const meanDeg = daysElapsed * (360 / 365.24219);
            document.getElementById('ring-cycle-mean').style.transform = `rotate(${meanDeg}deg)`;
            document.getElementById('ring-cycle-true').style.transform = `rotate(${meanDeg + qData.delta}deg)`;
            document.getElementById('ring-day').style.transform = `rotate(${((t % 86400000) / 86400000) * 360}deg)`;

            // Sample Data Injection (Mirroring Aperture Logic)
            if(document.getElementById('face-BIO-HRV')) document.getElementById('face-BIO-HRV').innerText = (65 + Math.cos(t/15000)*10).toFixed(1) + " MS";
            if(document.getElementById('face-MEC-DRIFT')) document.getElementById('face-MEC-DRIFT').innerText = (qData.delta).toFixed(4) + "°";
            if(document.getElementById('face-COM-NODE')) document.getElementById('face-COM-NODE').innerText = `Q${qData.quad} S${qData.sect} D${qData.day}`;
        });

        window.refreshHUD();
    </script>
</body>
</html>
